<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SAT.AR — アマチュア無線衛星 AR トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400;600&display=swap');

  :root {
    --ink: #f5f1e6;
    --ink-dim: rgba(245, 241, 230, 0.55);
    --accent: #f4c56b;
    --iss: #ff6b47;
    --fm-sat: #4fb3d9;
    --linear: #b88ce8;
    --digi: #9be892;
    --glass: rgba(10, 14, 24, 0.78);
    --grid: rgba(245, 241, 230, 0.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background: #050812;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: radial-gradient(ellipse at top, #0f1830 0%, #050812 70%), #050812;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    overflow-y: auto;
  }

  #startScreen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.8) 50%, transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6) 50%, transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.7) 50%, transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.5) 50%, transparent),
      radial-gradient(2px 2px at 90% 40%, rgba(255,255,255,0.4) 50%, transparent),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.6) 50%, transparent),
      radial-gradient(1px 1px at 50% 15%, rgba(255,255,255,0.5) 50%, transparent),
      radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.6) 50%, transparent);
    opacity: 0.7;
    pointer-events: none;
  }

  #startScreen > * { position: relative; z-index: 1; }

  .start-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .start-title {
    font-size: 72px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 0.9;
    margin-bottom: 4px;
  }
  .start-title .dot { color: var(--accent); font-style: normal; }

  .start-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .tle-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    margin-bottom: 28px;
    padding: 12px 16px;
    border: 1px solid var(--grid);
    max-width: 300px;
    line-height: 1.7;
  }
  .tle-status .label {
    color: var(--accent);
    letter-spacing: 0.15em;
    font-size: 9px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .tle-status .val { color: var(--ink); }
  .tle-status.loading .val::after {
    content: '';
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  .permissions-list {
    list-style: none;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    margin-bottom: 32px;
    line-height: 1.9;
    max-width: 280px;
  }

  .permissions-list li::before {
    content: '-> ';
    color: var(--accent);
    margin-right: 8px;
  }

  .start-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 18px 48px;
    background: var(--accent);
    color: #050812;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    position: relative;
    z-index: 10;
  }
  .start-btn:active { transform: scale(0.96); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .start-note {
    margin-top: 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    max-width: 320px;
    line-height: 1.8;
  }

  #mainView { position: fixed; inset: 0; display: none; }

  #cameraVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #050812;
    z-index: 0;
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  #overlay::before, #overlay::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    height: 140px;
    pointer-events: none;
  }
  #overlay::before {
    top: 0;
    background: linear-gradient(to bottom, rgba(5,8,18,0.85), transparent);
  }
  #overlay::after {
    bottom: 0;
    height: 200px;
    background: linear-gradient(to top, rgba(5,8,18,0.9), transparent);
  }

  .hud-top {
    position: absolute;
    top: env(safe-area-inset-top, 20px);
    left: 0;
    right: 0;
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: auto;
  }

  .hud-brand {
    font-size: 22px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .hud-brand .dot { color: var(--accent); font-style: normal; }
  .hud-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .hud-compass {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-align: right;
  }
  .hud-compass .big {
    font-size: 22px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .hud-compass .label {
    font-size: 8px;
    color: var(--ink-dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 60px;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(244, 197, 107, 0.45);
  }
  .crosshair::before { top: 50%; left: 0; right: 0; height: 1px; }
  .crosshair::after { left: 50%; top: 0; bottom: 0; width: 1px; }
  .crosshair-center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  .compass-strip {
    position: absolute;
    top: calc(env(safe-area-inset-top, 20px) + 72px);
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    max-width: 420px;
    height: 34px;
    overflow: hidden;
    z-index: 8;
    pointer-events: none;
    mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
  }

  #compassBar {
    position: absolute;
    height: 100%;
    display: flex;
    align-items: center;
    will-change: transform;
  }

  .compass-tick {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .compass-tick .line {
    width: 1px;
    height: 8px;
    background: var(--ink-dim);
  }
  .compass-tick.cardinal .line {
    height: 14px;
    background: var(--accent);
    width: 2px;
  }
  .compass-tick .lbl {
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 3px;
  }
  .compass-tick.cardinal .lbl {
    color: var(--accent);
    font-weight: 600;
    font-size: 12px;
  }

  .sat-marker {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    transition: opacity 0.3s;
    z-index: 6;
  }

  .sat-marker .ring {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sat-marker .ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0.3;
  }

  .sat-marker.iss .ring::after {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0.6;
    animation: pulse-ring 2s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .sat-marker .dot {
    width: 10px;
    height: 10px;
    background: currentColor;
    border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
  }

  .sat-marker .label {
    position: absolute;
    top: 50%;
    left: calc(100% + 12px);
    transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 8px 12px;
    border: 1px solid currentColor;
    border-left: 3px solid currentColor;
  }
  .sat-marker .label .name {
    font-size: 11px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.05em;
    display: block;
  }
  .sat-marker .label .meta {
    font-size: 9px;
    color: var(--ink-dim);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .sat-marker.iss { color: var(--iss); }
  .sat-marker.fm { color: var(--fm-sat); }
  .sat-marker.linear { color: var(--linear); }
  .sat-marker.digi { color: var(--digi); }

  /* ---- Next-up banner (常時表示、コンパクト) ---- */
  .next-up-bar {
    position: absolute;
    bottom: env(safe-area-inset-bottom, 0);
    left: 0;
    right: 0;
    padding: 10px 16px calc(env(safe-area-inset-bottom, 0) + 10px);
    background: linear-gradient(to top, rgba(5,8,18,0.95), rgba(5,8,18,0.7) 80%, transparent);
    z-index: 10;
    pointer-events: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  .next-up-bar .next-up-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .next-up-bar .next-sat-info {
    flex: 1;
    font-size: 11px;
    color: var(--ink);
  }
  .next-up-bar .next-sat-info .sat-name {
    font-weight: 600;
    margin-right: 6px;
  }
  .next-up-bar .next-sat-info .sat-detail {
    font-size: 9px;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .next-up-bar .next-sat-info .countdown {
    color: var(--accent);
    font-weight: 600;
  }
  .next-up-bar .time-display {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }
  .menu-toggle-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 10px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    cursor: pointer;
    margin-left: 12px;
    flex-shrink: 0;
  }
  .menu-toggle-btn:active { background: rgba(244, 197, 107, 0.15); }

  /* ---- Full satellite drawer ---- */
  .sat-drawer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 70vh;
    background: rgba(5,8,18,0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    pointer-events: auto;
    padding: 0 16px calc(env(safe-area-inset-bottom, 0) + 16px);
    border-top: 1px solid var(--grid);
  }
  .sat-drawer.open { transform: translateY(0); }
  .sat-drawer-header {
    position: sticky;
    top: 0;
    background: rgba(5,8,18,0.98);
    padding: 14px 0 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--grid);
    z-index: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .sat-drawer-header .title {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .drawer-close-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--grid);
    cursor: pointer;
  }

  .sat-compact {
    display: grid;
    grid-template-columns: 26px 14px 1fr auto;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--grid);
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .sat-compact:last-child { border-bottom: none; }
  .sat-compact.below { opacity: 0.5; }
  .sat-compact.tracked { opacity: 1; }

  .sat-toggle {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1.5px solid var(--grid);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: transparent;
    padding: 0;
  }
  .sat-toggle.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(244, 197, 107, 0.1);
  }

  .sat-compact .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    justify-self: center;
  }

  .sat-compact .info .name {
    font-size: 11px;
    color: var(--ink);
    font-weight: 600;
  }
  .sat-compact .info .freq {
    font-size: 9px;
    color: var(--ink-dim);
    margin-top: 1px;
  }

  .sat-compact .pos {
    font-size: 10px;
    color: var(--ink);
    text-align: right;
  }
  .sat-compact .pos .status {
    font-size: 8px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-top: 1px;
  }
  .sat-compact.below .pos .status { color: var(--ink-dim); }
  .sat-compact .pos .next-pass {
    font-size: 8px;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-top: 1px;
  }

  .tle-footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--grid);
    font-size: 9px;
    color: var(--ink-dim);
    text-align: center;
    letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .tle-footer.stale { color: var(--iss); }

  .tle-refresh-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 8px;
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--grid);
    cursor: pointer;
    margin-left: 8px;
  }
  .tle-refresh-btn:active { background: rgba(244, 197, 107, 0.1); color: var(--accent); }

  /* ---- Edge indicator for tracked sats ---- */
  .sat-edge-indicator {
    position: absolute;
    z-index: 7;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 6px 10px;
    border-radius: 3px;
    background: var(--glass);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    border: 1px solid;
  }
  .sat-edge-indicator .arrow {
    font-size: 14px;
    line-height: 1;
  }
  .sat-edge-indicator .edge-detail {
    font-size: 8px;
    opacity: 0.7;
    margin-top: 1px;
  }

  /* 方位が合った時のガイド表示 */
  .sat-guide {
    position: absolute;
    z-index: 8;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 8px 16px;
    border-radius: 4px;
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    white-space: nowrap;
    text-align: center;
    border: 1.5px solid;
    left: 50%;
    transform: translateX(-50%);
    animation: guidePulse 2s ease-in-out infinite;
  }
  .sat-guide .guide-name {
    font-size: 12px;
    margin-bottom: 2px;
  }
  .sat-guide .guide-arrow {
    font-size: 18px;
    line-height: 1;
  }
  .sat-guide .guide-detail {
    font-size: 9px;
    opacity: 0.8;
    margin-top: 2px;
  }
  @keyframes guidePulse {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 1; border-width: 2px; }
  }

  .error-toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--iss);
    padding: 20px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    text-align: center;
    z-index: 100;
    max-width: 300px;
    display: none;
  }
  .error-toast.active { display: block; }
  .error-toast .title {
    color: var(--iss);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

</style>
</head>
<body>

<div id="debugLog" style="position:fixed;top:0;left:0;right:0;max-height:50vh;
     overflow-y:auto;background:rgba(0,0,0,0.92);color:#0f0;font:11px monospace;
     padding:8px;z-index:99999;white-space:pre-wrap;word-break:break-all;
     border-bottom:1px solid #0f0;pointer-events:auto;display:none;"></div>

<script>
var debugMode = location.search.indexOf('debug=1') !== -1;
if (debugMode) {
  document.getElementById('debugLog').style.display = 'block';
}

function dlog(msg) {
  var el = document.getElementById('debugLog');
  var line = new Date().toISOString().substr(11,12) + ' ' + msg;
  if (debugMode && el) { el.textContent += line + '\n'; el.scrollTop = el.scrollHeight; }
  console.log(line);
}

window.addEventListener('error', function(e) {
  dlog('ERROR: ' + e.message + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
});
window.addEventListener('unhandledrejection', function(e) {
  dlog('REJECTION: ' + (e.reason && e.reason.message || JSON.stringify(e.reason)));
});

dlog('Boot: iOS=' + /iPhone|iPad|iPod/.test(navigator.userAgent) + ' UA=' + navigator.userAgent.substr(0,60));
</script>

<div id="startScreen">
  <div class="start-eyebrow">Augmented Reality</div>
  <div class="start-title">SAT<span class="dot">.</span>AR</div>
  <div class="start-sub">Amateur Radio Satellite Tracker</div>

  <div class="tle-status" id="tleStatus">
    <div class="label">TLE Data</div>
    <div class="val" id="tleStatusText">Initializing</div>
  </div>

  <ul class="permissions-list">
    <li>位置情報 (観測地の特定)</li>
    <li>端末の向き (方位+傾き)</li>
    <li>カメラ (背景映像)</li>
  </ul>

  <button class="start-btn" id="startBtn">START TRACKING</button>

  <div class="start-note">
    ボタンをタップすると権限リクエストが順に表示されます。<br>
    各項目で「許可」を選んでください。<br>
    ※HTTPS環境が必要です
  </div>
</div>

<div id="mainView">
  <video id="cameraVideo" autoplay playsinline muted></video>

  <div id="overlay">
    <div class="hud-top">
      <div>
        <div class="hud-brand">SAT<span class="dot">.</span>AR</div>
        <div class="hud-sub" id="locLabel">---</div>
      </div>
      <div class="hud-compass">
        <div class="big" id="headingBig">---&deg;</div>
        <div class="label" id="headingCard">---</div>

var TLE_CACHE_KEY = 'sat_ar_tle_cache_v1';
var TLE_CACHE_MAX_AGE = 24 * 60 * 60 * 1000;
var CELESTRAK_AMATEUR_URL = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=amateur&FORMAT=tle';
var CORS_PROXIES = [
  function(url) { return 'https://corsproxy.io/?' + encodeURIComponent(url); },
  function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); }
];

var tleDatabase = {};
var tleLastUpdate = null;
var tleSource = 'none';

async function loadTLEs(forceRefresh) {
  updateTleStatus('loading', 'Checking cache');

  if (!forceRefresh) {
    var cached = readCache();
    if (cached) {
      tleDatabase = cached.database;
      tleLastUpdate = cached.timestamp;
      tleSource = cached.source || 'cache';
      var ageHours = Math.floor((Date.now() - tleLastUpdate) / (1000 * 60 * 60));
      updateTleStatus('ok', 'Cached (' + ageHours + 'h old)');

      if (Date.now() - tleLastUpdate > TLE_CACHE_MAX_AGE) {
        fetchFreshTLEs().catch(function(){});
      }
      return true;
    }
  }

  updateTleStatus('loading', 'Fetching from Celestrak');
  return await fetchFreshTLEs();
}

async function fetchFreshTLEs() {
  var tleText = null;
  var usedSource = 'celestrak';

  // 1. Celestrak直接
  try {
    var res = await fetch(CELESTRAK_AMATEUR_URL, { mode: 'cors' });
    if (res.ok) {
      tleText = await res.text();
    }
  } catch(e) {
    console.warn('Direct Celestrak fetch failed:', e.message);
  }

  // 2. CORSプロキシで再試行
  if (!tleText) {
    for (var i = 0; i < CORS_PROXIES.length; i++) {
      var proxyUrl = CORS_PROXIES[i](CELESTRAK_AMATEUR_URL);
      try {
        updateTleStatus('loading', 'Trying proxy ' + (i+1));
        var res2 = await fetch(proxyUrl);
        if (res2.ok) {
          tleText = await res2.text();
          usedSource = 'proxy-' + (i+1);
          break;
        }
      } catch(e) {
        console.warn('Proxy ' + (i+1) + ' failed:', e.message);
      }
    }
  }

  if (!tleText || tleText.length < 100) {
    updateTleStatus('error', 'Fetch failed, using fallback');
    return loadFallbackTLEs();
  }

  var parsed = parseTLEText(tleText);
  if (Object.keys(parsed).length === 0) {
    updateTleStatus('error', 'Parse failed, using fallback');
    return loadFallbackTLEs();
  }

  tleDatabase = parsed;
  tleLastUpdate = Date.now();
  tleSource = usedSource;
  writeCache({ database: parsed, timestamp: tleLastUpdate, source: usedSource });

  var count = Object.keys(parsed).length;
  updateTleStatus('ok', 'Fresh (' + count + ' sats from ' + usedSource + ')');
  return true;
}

function parseTLEText(text) {
  var lines = text.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(function(l) { return l; });
  var db = {};

  for (var i = 0; i < lines.length - 2; i++) {
    var line1 = lines[i];
    var line2 = lines[i + 1];
    var line3 = lines[i + 2];

    if (line2.indexOf('1 ') === 0 && line3.indexOf('2 ') === 0) {
      var noradMatch = line2.match(/^1\s+(\d+)/);
      if (noradMatch) {
        var norad = parseInt(noradMatch[1], 10);
        db[norad] = { name: line1, tle1: line2, tle2: line3 };
      }
    }
  }
  return db;
}

function readCache() {
  try {
    var raw = localStorage.getItem(TLE_CACHE_KEY);
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data.timestamp || !data.database) return null;
    return data;
  } catch(e) { return null; }
}

function writeCache(data) {
  try {
    localStorage.setItem(TLE_CACHE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Cache write failed:', e); }
}

      tle2: '2 44909  82.5210 128.1090 0219310 247.1820 110.7400 12.79700000000011' },
    39444: { name: 'AO-73',

function updateTleStatus(state, msg) {

// ============================================================
// 状態
// ============================================================
var observer = null;
var observerLabel = '---';
var deviceHeading = 0;
var devicePitch = 0;
var deviceElevation = 0;
var deviceRoll = 0;

// Sensor fusion state
var smoothHeadingSin = 0;
var smoothHeadingCos = 1;
var smoothPitchSin = 0;
var smoothPitchCos = 1;
var smoothElevation = 0;
var smoothRoll = 0;
var sensorInitialized = false;
// Gyroscope-primary heading with complementary filter
var gyroHeading = 0;            // gyro-integrated absolute heading (degrees)
var lastGyroTime = 0;
// Complementary filter: compass corrects gyro drift
var COMPASS_CORRECTION_K = 0.005; // correction per orientation event (~3s convergence at 60Hz)
var HEADING_SMOOTH_K = 0.3;     // display smoothing (gyro is inherently smooth)
// Pitch smoothing parameters
var PITCH_K_MIN = 0.10;
var PITCH_K_MAX = 0.6;
var MOVE_THRESHOLD = 3;
var MOVE_SCALE = 15;
var cameraFOV = 65;
var isRunning = false;
var nextPassCache = {}; // { noradId: { riseTime, maxEl, duration, azAtRise } }
var trackedSats = {}; // { noradId: true/false } user-selected tracking
var drawerOpen = false;
var autoTrackedIds = []; // auto-selected: next 2 upcoming sats

// ============================================================
// スタート
// ============================================================
document.getElementById('startBtn').addEventListener('click', function() {
  dlog('startBtn: clicked');
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'LOADING...';

  // iOS Safari: requestPermission() MUST be called synchronously in user gesture.
  // No await/async before this call, or the gesture context is lost.
  // Both orientation (compass) and motion (gyroscope) need separate permissions on iOS 13+.
  var orientationPermissionPromise;
  var motionPermissionPromise;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    dlog('startBtn: calling DeviceOrientationEvent.requestPermission() SYNC in gesture');
    orientationPermissionPromise = DeviceOrientationEvent.requestPermission();
  } else {
    orientationPermissionPromise = Promise.resolve('not-needed');
  }
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    dlog('startBtn: calling DeviceMotionEvent.requestPermission() SYNC in gesture');
    motionPermissionPromise = DeviceMotionEvent.requestPermission();
  } else {
    motionPermissionPromise = Promise.resolve('not-needed');
  }

  Promise.all([orientationPermissionPromise, motionPermissionPromise]).then(function(results) {
    var orientState = results[0];
    var motionState = results[1];
    dlog('startBtn: permission results orientation=' + orientState + ' motion=' + motionState);

    if (orientState === 'granted' || orientState === 'not-needed') {
      window.addEventListener('deviceorientation', handleOrientation, true);
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      }
    }
    if (motionState === 'granted' || motionState === 'not-needed') {
      window.addEventListener('devicemotion', handleGyro, true);
    }

    if (orientState === 'denied' && motionState === 'denied') {
      dlog('startBtn: both permissions denied (continuing anyway)');
    }
    return continueStartup();
  }).catch(function(err) {
    dlog('startBtn: permission error: ' + (err.message || err) + ' (continuing anyway)');
    window.addEventListener('deviceorientation', handleOrientation, true);
    window.addEventListener('devicemotion', handleGyro, true);
    return continueStartup();
  });

  async function continueStartup() {
    try {
      dlog('startBtn: requesting geolocation...');
      await requestGeolocation();
      dlog('startBtn: geolocation done');

      dlog('startBtn: requesting camera...');
      await requestCamera();
      dlog('startBtn: camera done');

      dlog('startBtn: switching to mainView');
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('mainView').style.display = 'block';

      dlog('startBtn: calling startTracking');
      startTracking();
      dlog('startBtn: startTracking done, app running');
    } catch(err) {
      dlog('startBtn: ERROR: ' + (err.message || err));
      btn.disabled = false;
      btn.textContent = 'START TRACKING';
      showError(err.message || '権限取得に失敗しました');
    }
  }
});

function requestGeolocation() {
  return new Promise(function(resolve) {
    dlog('requestGeolocation: start');
    if (!navigator.geolocation) {
      dlog('requestGeolocation: no geolocation API, using Tokyo default');
      observer = {
        latitude: satellite.degreesToRadians(35.6895),
        longitude: satellite.degreesToRadians(139.6917),
        height: 0.040
      };
      observerLabel = 'Tokyo (default)';
      resolve();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        observer = {
          latitude: satellite.degreesToRadians(pos.coords.latitude),
          longitude: satellite.degreesToRadians(pos.coords.longitude),
          height: (pos.coords.altitude || 0) / 1000
        };
        observerLabel = pos.coords.latitude.toFixed(3) + 'N, ' + pos.coords.longitude.toFixed(3) + 'E';
        dlog('requestGeolocation: OK ' + observerLabel);
        resolve();
      },
      function(err) {
        dlog('requestGeolocation: failed (' + (err && err.message || err) + '), using Tokyo fallback');
        observer = {
          latitude: satellite.degreesToRadians(35.6895),
          longitude: satellite.degreesToRadians(139.6917),
          height: 0.040
        };
        observerLabel = 'Tokyo (fallback)';
        resolve();
      },
      { enableHighAccuracy: false, timeout: 5000 }
    );
  });
}

// Note: orientation permission is now handled directly in the click handler
// to preserve user gesture context on iOS Safari.

// Gyroscope handler: integrate rotation rate for continuous heading tracking
function handleGyro(e) {
  if (!e.rotationRate) return;
  var now = performance.now();
  var dt = lastGyroTime ? (now - lastGyroTime) / 1000 : 0;
  lastGyroTime = now;
  if (dt <= 0 || dt > 0.2) return; // skip stale or first reading

  // Recover world-yaw rate from device rotation rates.
  // World vertical projects onto device Z by cos(pitch), onto Y by sin(pitch).
  var pitchRad = devicePitch * Math.PI / 180;
  var yawRate = (e.rotationRate.alpha || 0) * Math.cos(pitchRad)
              + (e.rotationRate.gamma || 0) * Math.sin(pitchRad);
  // webkitCompassHeading is CW from north; rotationRate.alpha positive = CCW
  gyroHeading -= yawRate * dt;
  gyroHeading = ((gyroHeading % 360) + 360) % 360;
}

function handleOrientation(e) {
  var compassHeading = 0;
  if (typeof e.webkitCompassHeading === 'number') {
    compassHeading = e.webkitCompassHeading;
  } else if (e.absolute && typeof e.alpha === 'number') {
    compassHeading = 360 - e.alpha;
  } else if (typeof e.alpha === 'number') {
    compassHeading = 360 - e.alpha;
  }
  var pitch = e.beta || 0;
  var roll = e.gamma || 0;
  var compassAccuracy = e.webkitCompassAccuracy || 999; // P0: iOS quality signal

  // Camera elevation from rotation matrix (continuous at beta=±180°, accounts for roll)
  // R = Rz(α)·Rx(β)·Ry(γ), camera = −Z axis → elevation = asin(−cos β · cos γ)
  var pRad = pitch * Math.PI / 180;
  var rRad = roll * Math.PI / 180;
  var rawElevation = Math.asin(Math.max(-1, Math.min(1, -Math.cos(pRad) * Math.cos(rRad)))) * 180 / Math.PI;
  var deviceEl = rawElevation;

  // Initialize gyro heading from first compass reading
  if (!sensorInitialized) {
    gyroHeading = compassHeading;
  }

  // Complementary filter: compass gently corrects gyro drift
  // Gyro provides responsive short-term tracking; compass prevents long-term drift
  if (sensorInitialized && compassAccuracy < 50) {
    var compassDiff = compassHeading - gyroHeading;
    if (compassDiff > 180) compassDiff -= 360;
    if (compassDiff < -180) compassDiff += 360;
    // Weaken correction when compass accuracy is poor
    var corrK = compassAccuracy > 25 ? COMPASS_CORRECTION_K * 0.3 : COMPASS_CORRECTION_K;
    gyroHeading += compassDiff * corrK;
    gyroHeading = ((gyroHeading % 360) + 360) % 360;
  }

  var heading = gyroHeading;

  // Low-pass filter
  var headRad = heading * Math.PI / 180;
  var rawSin = Math.sin(headRad);
  var rawCos = Math.cos(headRad);

  if (!sensorInitialized) {
    smoothHeadingSin = rawSin;
    smoothHeadingCos = rawCos;
    smoothPitchSin = Math.sin(pRad);
    smoothPitchCos = Math.cos(pRad);
    smoothElevation = rawElevation;
    smoothRoll = roll;
    sensorInitialized = true;
  } else {
    var elevDelta = Math.abs(rawElevation - smoothElevation);
    var pitchK = PITCH_K_MIN + (PITCH_K_MAX - PITCH_K_MIN) *
      Math.min(1, Math.max(0, (elevDelta - MOVE_THRESHOLD) / MOVE_SCALE));

    // Light heading smoothing — gyro is inherently smooth, no adaptive k needed
    smoothHeadingSin += HEADING_SMOOTH_K * (rawSin - smoothHeadingSin);
    smoothHeadingCos += HEADING_SMOOTH_K * (rawCos - smoothHeadingCos);
    smoothPitchSin += pitchK * (Math.sin(pRad) - smoothPitchSin);
    smoothPitchCos += pitchK * (Math.cos(pRad) - smoothPitchCos);
    smoothElevation += pitchK * (rawElevation - smoothElevation);
    smoothRoll += pitchK * (roll - smoothRoll);
  }

  var smoothedHeading = Math.atan2(smoothHeadingSin, smoothHeadingCos) * 180 / Math.PI;
  if (smoothedHeading < 0) smoothedHeading += 360;

  deviceHeading = smoothedHeading;
  devicePitch = Math.atan2(smoothPitchSin, smoothPitchCos) * 180 / Math.PI;
  deviceElevation = smoothElevation;
  deviceRoll = smoothRoll;
}

async function requestCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error('このブラウザはカメラをサポートしていません');
  }

  dlog('requestCamera: calling getUserMedia');
  var constraints = [
    { video: { facingMode: { exact: 'environment' } }, audio: false },
    { video: { facingMode: 'environment' }, audio: false },
    { video: { facingMode: { ideal: 'environment' } }, audio: false },
    { video: true, audio: false }
  ];

  var stream = null;
  var lastErr = null;
  for (var i = 0; i < constraints.length; i++) {
    try {
      dlog('requestCamera: trying constraint ' + i);
      stream = await navigator.mediaDevices.getUserMedia(constraints[i]);
      dlog('requestCamera: got stream with constraint ' + i);
      break;
    } catch(e) {
      dlog('requestCamera: constraint ' + i + ' failed: ' + e.name + ' - ' + e.message);
      lastErr = e;
    }
  }

  if (!stream) {
    throw new Error('カメラ取得失敗: ' + (lastErr && lastErr.message || 'unknown'));
  }

  var video = document.getElementById('cameraVideo');
  video.srcObject = stream;
  dlog('requestCamera: video.srcObject set, calling play()');

  try {
    await video.play();
    dlog('requestCamera: video.play() OK');
  } catch(e) {
    dlog('requestCamera: video.play() failed: ' + e.message + ' (continuing anyway)');
  }
}

function startTracking() {
  isRunning = true;
  document.getElementById('locLabel').textContent = observerLabel;

  try { buildCompassBar(); } catch(e) { dlog('startTracking: buildCompassBar error: ' + e.message); }
  try { updateTleFooter(); } catch(e) { dlog('startTracking: updateTleFooter error: ' + e.message); }
  try { render(); } catch(e) { dlog('startTracking: render error: ' + e.message); }

  try { computeNextPasses(); } catch(e) { dlog('startTracking: computeNextPasses error: ' + e.message); }

  setInterval(render, 200);
  setInterval(updateTleFooter, 60000);
  setInterval(computeNextPasses, 60000);
  requestAnimationFrame(updateOrientationDisplay);
}

function computeSatPosition(sat, date) {
  var tleData = tleDatabase[sat.norad];
  if (!tleData) return null;

  try {
    var satrec = satellite.twoline2satrec(tleData.tle1, tleData.tle2);
    var pv = satellite.propagate(satrec, date);
    if (!pv.position) return null;

    var gmst = satellite.gstime(date);
    var ecf = satellite.eciToEcf(pv.position, gmst);
    var look = satellite.ecfToLookAngles(observer, ecf);

    return {
      azimuth: satellite.radiansToDegrees(look.azimuth),
      elevation: satellite.radiansToDegrees(look.elevation),
      rangeKm: look.rangeSat
    };
  } catch(e) { return null; }
}

// ============================================================
// 次のパス予測（60秒ごとに計算）
// ============================================================
function computeNextPasses() {
  if (!observer) return;
  var now = new Date();
  var maxLookAhead = 24 * 60 * 60 * 1000; // 24時間先まで
  var stepMs = 60 * 1000; // 1分刻み

  TRACKED_SATS.forEach(function(sat) {
    var tleData = tleDatabase[sat.norad];
    if (!tleData) return;

    try {
      var satrec = satellite.twoline2satrec(tleData.tle1, tleData.tle2);
      var currentPos = computeSatPosition(sat, now);

      // 現在可視なら次パスは不要（現在のパス情報を記録）
      if (currentPos && currentPos.elevation > 0) {
        nextPassCache[sat.norad] = { riseTime: null, maxEl: currentPos.elevation, isNow: true, azAtRise: currentPos.azimuth };
        return;
      }

      // 未来方向にスキャンして次の仰角>0の時刻を探す
      var riseTime = null;
      var maxEl = 0;
      var azAtRise = 0;
      var wasAbove = false;
      var foundPass = false;

      for (var dt = stepMs; dt <= maxLookAhead; dt += stepMs) {
        var futureDate = new Date(now.getTime() + dt);
        var pv = satellite.propagate(satrec, futureDate);
        if (!pv.position) continue;

        var gmst = satellite.gstime(futureDate);
        var ecf = satellite.eciToEcf(pv.position, gmst);
        var look = satellite.ecfToLookAngles(observer, ecf);
        var el = satellite.radiansToDegrees(look.elevation);
        var az = satellite.radiansToDegrees(look.azimuth);

        if (el > 0 && !riseTime) {
          riseTime = futureDate;
          azAtRise = az;
        }
        if (riseTime && el > maxEl) {
          maxEl = el;
        }
        if (riseTime && el <= 0) {
          foundPass = true;
          break; // パス完了
        }
      }

      if (riseTime) {
        nextPassCache[sat.norad] = {
          riseTime: riseTime,
          maxEl: Math.round(maxEl),
          azAtRise: Math.round(azAtRise),
          isNow: false
        };
      } else {
        nextPassCache[sat.norad] = null;
      }
    } catch(e) {
      // 計算エラーは無視
    }
  });
}

function formatTimeUntil(futureDate) {
  var diffMs = futureDate.getTime() - Date.now();
  if (diffMs < 0) return 'now';
  var diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 60) return diffMin + 'min';
  var h = Math.floor(diffMin / 60);
  var m = diffMin % 60;
  return h + 'h' + (m > 0 ? m + 'm' : '');
}

function isSatTracked(norad) {
  // ユーザが明示的にON/OFFした場合はそれに従う
  if (trackedSats.hasOwnProperty(norad)) return trackedSats[norad];
  // デフォルト: 可視衛星 + 自動選択された次の2機
  return autoTrackedIds.indexOf(norad) !== -1;
}

function getSatColor(type) {
  return type === 'iss' ? 'var(--iss)'
       : type === 'fm' ? 'var(--fm-sat)'
       : type === 'linear' ? 'var(--linear)'
       : 'var(--digi)';
}

function render() {
  if (!isRunning || !observer) return;

  if (Object.keys(tleDatabase).length === 0) {
    dlog('render: no TLEs loaded, loading fallback');
    loadFallbackTLEs();
  }

  var now = new Date();
  document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('ja-JP');

  var markerLayer = document.getElementById('markerLayer');
  markerLayer.innerHTML = '';
  edgeSlotIndex = 0;

  // 全衛星の位置を計算してソート
  var satData = [];
  TRACKED_SATS.forEach(function(sat) {
    var pos = computeSatPosition(sat, now);
    if (!pos) return;
    var pass = nextPassCache[sat.norad] || null;
    satData.push({ sat: sat, pos: pos, pass: pass });
  });

  satData.sort(function(a, b) {
    var aVis = a.pos.elevation > 0;
    var bVis = b.pos.elevation > 0;
    if (aVis && !bVis) return -1;
    if (!aVis && bVis) return 1;
    if (aVis && bVis) return b.pos.elevation - a.pos.elevation;
    var aTime = (a.pass && a.pass.riseTime) ? a.pass.riseTime.getTime() : Infinity;
    var bTime = (b.pass && b.pass.riseTime) ? b.pass.riseTime.getTime() : Infinity;
    return aTime - bTime;
  });

  // 自動追跡: 可視衛星 + 次に来る2機
  var newAutoTracked = [];
  var belowCount = 0;
  satData.forEach(function(item) {
    if (item.pos.elevation > 0) {
      newAutoTracked.push(item.sat.norad);
    } else if (belowCount < 2 && item.pass && item.pass.riseTime) {
      newAutoTracked.push(item.sat.norad);
      belowCount++;
    }
  });
  autoTrackedIds = newAutoTracked;

  // ---- next-up バー更新 ----
  var nextUpInfo = document.getElementById('nextUpInfo');
  var visibleSats = satData.filter(function(d) { return d.pos.elevation > 0; });
  var upcomingSats = satData.filter(function(d) {
    return d.pos.elevation <= 0 && d.pass && d.pass.riseTime;
  });

  if (visibleSats.length > 0) {
    var vs = visibleSats[0];
    var vsDir = headingToCardinal(vs.pos.azimuth);
    nextUpInfo.innerHTML =
      '<span class="sat-name" style="color:' + getSatColor(vs.sat.type) + '">' + vs.sat.displayName + '</span> ' +
      '<span class="countdown">VISIBLE</span> · ' + vsDir + ' EL ' + vs.pos.elevation.toFixed(0) + '°' +
      (visibleSats.length > 1 ? ' <span style="color:var(--ink-dim)">+' + (visibleSats.length - 1) + '</span>' : '') +
      (upcomingSats.length > 0 ?
        '<div class="sat-detail">NEXT: ' + upcomingSats[0].sat.displayName + ' in ' + formatTimeUntil(upcomingSats[0].pass.riseTime) + ' ' + headingToCardinal(upcomingSats[0].pass.azAtRise) + '</div>' : '');
  } else if (upcomingSats.length > 0) {
    var ns = upcomingSats[0];
    var riseDir = headingToCardinal(ns.pass.azAtRise);
    nextUpInfo.innerHTML =
      'NEXT: <span class="sat-name" style="color:' + getSatColor(ns.sat.type) + '">' + ns.sat.displayName + '</span> ' +
      '<span class="countdown">' + formatTimeUntil(ns.pass.riseTime) + '</span> · ' +
      riseDir + ' · max EL ' + ns.pass.maxEl + '°' +
      (upcomingSats.length > 1 ?
        '<div class="sat-detail">THEN: ' + upcomingSats[1].sat.displayName + ' in ' + formatTimeUntil(upcomingSats[1].pass.riseTime) + ' ' + headingToCardinal(upcomingSats[1].pass.azAtRise) + '</div>' : '');
  } else {
    nextUpInfo.textContent = 'No upcoming passes';
  }

  // ---- ドロワーリスト更新（開いている時だけ） ----
  if (drawerOpen) {
    var listBody = document.getElementById('satListCompact');
    listBody.innerHTML = '';

    satData.forEach(function(item) {
      var sat = item.sat;
      var pos = item.pos;
      var pass = item.pass;
      var visible = pos.elevation > 0;
      var dotColor = getSatColor(sat.type);
      var cardinal = headingToCardinal(pos.azimuth);
      var tracked = isSatTracked(sat.norad);

      var statusHtml;
      if (visible) {
        statusHtml = '<div class="status">VISIBLE</div>';
      } else if (pass && pass.riseTime) {
        var riseCardinal = headingToCardinal(pass.azAtRise);
        statusHtml = '<div class="next-pass">' +
          formatTimeUntil(pass.riseTime) + ' · max EL ' + pass.maxEl + '° · ' + riseCardinal +
          '</div>';
      } else {
        statusHtml = '<div class="status">BELOW HORIZON</div>';
      }

      var row = document.createElement('div');
      row.className = 'sat-compact' + (visible ? '' : ' below') + (tracked ? ' tracked' : '');
      row.innerHTML =
        '<button class="sat-toggle' + (tracked ? ' active' : '') + '" data-norad="' + sat.norad + '">\u2713</button>' +
        '<div class="dot" style="background: ' + dotColor + '"></div>' +
        '<div class="info">' +
          '<div class="name">' + sat.displayName + '</div>' +
          '<div class="freq">' + sat.freq + '</div>' +
        '</div>' +
        '<div class="pos">' +
          'AZ ' + pos.azimuth.toFixed(0) + '° ' + cardinal + ' · EL ' + pos.elevation.toFixed(0) + '°' +
          statusHtml +
        '</div>';
      listBody.appendChild(row);

      // トグルボタンイベント
      row.querySelector('.sat-toggle').addEventListener('click', function() {
        var norad = parseInt(this.getAttribute('data-norad'), 10);
        var currentlyTracked = isSatTracked(norad);
        trackedSats[norad] = !currentlyTracked;
        this.classList.toggle('active');
      });
    });
  }

  // ---- AR マーカー + エッジインジケータ ----
  satData.forEach(function(item) {
    var sat = item.sat;
    var pos = item.pos;
    var pass = item.pass;
    var visible = pos.elevation > 0;
    var tracked = isSatTracked(sat.norad);

    if (visible) {
      var inFov = placeSatMarker(sat, pos);
      if (!inFov) placeEdgeIndicator(sat, pos, null);
    } else if (tracked && pass && pass.riseTime) {
      // 地平線以下だが追跡対象: 昇る方位を示すエッジインジケータ
      placeEdgeIndicator(sat, { azimuth: pass.azAtRise, elevation: 0 }, pass);
    }
  });
}

function placeSatMarker(sat, pos) {
  var azDiff = pos.azimuth - deviceHeading;
  while (azDiff > 180) azDiff -= 360;
  while (azDiff < -180) azDiff += 360;

  var elDiff = pos.elevation - deviceElevation;

  var screenW = window.innerWidth;
  var screenH = window.innerHeight;
  var halfFovH = cameraFOV / 2;
  var halfFovV = (cameraFOV * screenH / screenW) / 2;

  if (Math.abs(azDiff) > halfFovH + 10 || Math.abs(elDiff) > halfFovV + 10) return false;

  var x = screenW / 2 + (azDiff / halfFovH) * (screenW / 2);
  var y = screenH / 2 - (elDiff / halfFovV) * (screenH / 2);

  var marker = document.createElement('div');
  marker.className = 'sat-marker ' + sat.type;
  marker.style.left = x + 'px';
  marker.style.top = y + 'px';
  marker.innerHTML =
    '<div class="ring"><div class="dot"></div></div>' +
    '<div class="label">' +
      '<span class="name">' + sat.displayName + '</span>' +
      '<span class="meta">' + sat.freq + ' &middot; EL ' + pos.elevation.toFixed(0) + '&deg;</span>' +
    '</div>';
  document.getElementById('markerLayer').appendChild(marker);
  return true;
}

var edgeSlotIndex = 0; // reset each render frame

function placeEdgeIndicator(sat, pos, pass) {
  var azDiff = pos.azimuth - deviceHeading;
  while (azDiff > 180) azDiff -= 360;
  while (azDiff < -180) azDiff += 360;

  var screenW = window.innerWidth;
  var screenH = window.innerHeight;
  var margin = 8;
  var dotColor = getSatColor(sat.type);
  var halfFovH = cameraFOV / 2;

  // 方位がほぼ合っている場合 → 画面中央にガイド表示
  if (Math.abs(azDiff) < halfFovH) {
    var guide = document.createElement('div');
    guide.className = 'sat-guide';
    guide.style.color = dotColor;
    guide.style.borderColor = dotColor;

    // 画面上のX位置を方位差から計算
    var xPercent = 50 + (azDiff / halfFovH) * 50;
    guide.style.left = xPercent + '%';

    var arrowSymbol, elHint;
    if (pos.elevation > 0) {
      // 可視衛星 → 仰角方向を示す
      var elDiff = pos.elevation - deviceElevation;
      if (elDiff > 8) { arrowSymbol = '\u25B2'; elHint = 'EL ' + pos.elevation.toFixed(0) + '\u00B0 \u2191 (+' + Math.round(elDiff) + '\u00B0)'; }
      else if (elDiff < -8) { arrowSymbol = '\u25BC'; elHint = 'EL ' + pos.elevation.toFixed(0) + '\u00B0 \u2193 (' + Math.round(elDiff) + '\u00B0)'; }
      else { arrowSymbol = '\u25CF'; elHint = 'EL ' + pos.elevation.toFixed(0) + '\u00B0 \u2714'; }
    } else {
      // 地平線以下 → 地平線(EL 0°)方向へ誘導
      var elDiffToHorizon = 0 - deviceElevation; // 地平線との差
      var timeText = pass ? formatTimeUntil(pass.riseTime) : '?';
      if (deviceElevation > 8) {
        arrowSymbol = '\u25BC'; // 上を向きすぎ → 下げて
        elHint = timeText + ' · \u2193 horizon';
      } else if (deviceElevation < -8) {
        arrowSymbol = '\u25B2'; // 下を向きすぎ → 上げて
        elHint = timeText + ' · \u2191 horizon';
      } else {
        arrowSymbol = '\u23F3'; // ⏳ 方位OK・仰角OK → 待つだけ
        elHint = timeText + ' · max ' + (pass ? pass.maxEl : '?') + '\u00B0';
      }
    }

    // Y位置: 画面中央寄り、スロットでずらす
    guide.style.top = (screenH * 0.35 + edgeSlotIndex * 55) + 'px';

    // デバッグ情報（?debug=1 時のみ）
    var debugStr = '';
    if (new URLSearchParams(window.location.search).get('debug') === '1') {
      debugStr = '<div class="guide-detail" style="opacity:0.5">pitch=' + devicePitch.toFixed(0) + ' devEL=' + deviceElevation.toFixed(0) + ' satEL=' + pos.elevation.toFixed(0) + '</div>';
    }

    guide.innerHTML =
      '<div class="guide-arrow">' + arrowSymbol + '</div>' +
      '<div class="guide-name">' + sat.displayName + '</div>' +
      '<div class="guide-detail">' + elHint + '</div>' + debugStr;
    document.getElementById('markerLayer').appendChild(guide);
    edgeSlotIndex++;
    return;
  }

  // 方位がずれている場合 → 画面端にエッジインジケータ
  var arrow = azDiff < 0 ? '\u25C0' : '\u25B6';

  // Y位置をスロットでずらして重なり防止
  var yBase = 160 + edgeSlotIndex * 55;
  if (yBase > screenH - 180) yBase = 160 + (edgeSlotIndex % 3) * 55;

  var detailText = '';
  if (pass && pass.riseTime) {
    detailText = '<div class="edge-detail">' + formatTimeUntil(pass.riseTime) + ' · max ' + pass.maxEl + '°</div>';
  } else if (pos.elevation > 0) {
    detailText = '<div class="edge-detail">EL ' + pos.elevation.toFixed(0) + '°</div>';
  }

  var indicator = document.createElement('div');
  indicator.className = 'sat-edge-indicator';
  indicator.style.color = dotColor;
  indicator.style.borderColor = dotColor;
  indicator.style.top = yBase + 'px';

  if (azDiff < 0) {
    indicator.style.left = margin + 'px';
  } else {
    indicator.style.right = margin + 'px';
  }

  indicator.innerHTML = '<span class="arrow">' + arrow + '</span><div>' + sat.displayName + detailText + '</div>';
  document.getElementById('markerLayer').appendChild(indicator);
  edgeSlotIndex++;
}

function updateOrientationDisplay() {
  var headingBig = document.getElementById('headingBig');
  var headingCard = document.getElementById('headingCard');
  var compassBar = document.getElementById('compassBar');
  var elevLabel = document.getElementById('elevationLabel');

  headingBig.textContent = Math.round(deviceHeading) + '°';
  headingCard.textContent = headingToCardinal(deviceHeading);
  var devEl = deviceElevation;
  elevLabel.textContent = 'EL ' + Math.round(devEl) + '\u00B0';

  var tickWidth = 24;
  var barCenterOffset = compassBar.parentElement.offsetWidth / 2;
  var offset = barCenterOffset - (deviceHeading * tickWidth / 10) - tickWidth / 2;
  compassBar.style.transform = 'translateX(' + offset + 'px)';

  if (isRunning) requestAnimationFrame(updateOrientationDisplay);
}

function headingToCardinal(h) {
  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(h / 22.5) % 16];
}

function buildCompassBar() {
  var bar = document.getElementById('compassBar');
  bar.innerHTML = '';
  for (var deg = 0; deg < 360; deg += 10) {
    var tick = document.createElement('div');
    var isCardinal = deg % 90 === 0;
    tick.className = 'compass-tick' + (isCardinal ? ' cardinal' : '');
    tick.style.width = '24px';
    var label = isCardinal ? ['N','E','S','W'][deg/90] : (deg % 30 === 0 ? deg : '');
    tick.innerHTML = '<div class="line"></div><div class="lbl">' + label + '</div>';
    bar.appendChild(tick);
  }
}

function updateTleFooter() {
  var ageText = document.getElementById('tleAgeText');
  var footer = document.getElementById('tleFooter');
  if (!tleLastUpdate) {
    ageText.textContent = 'unknown';
    return;
  }

  var ageMs = Date.now() - tleLastUpdate;
  var ageHours = Math.floor(ageMs / (1000 * 60 * 60));
  var ageDays = Math.floor(ageHours / 24);

  var text;
  if (ageHours < 1) text = 'fresh';
  else if (ageHours < 24) text = ageHours + 'h old';
  else text = ageDays + 'd old';

  text += ' · ' + tleSource;
  ageText.textContent = text;

  footer.classList.toggle('stale', ageDays >= 3);
}

// ドロワー開閉
document.getElementById('menuToggleBtn').addEventListener('click', function() {
  drawerOpen = true;
  document.getElementById('satDrawer').classList.add('open');
});
document.getElementById('drawerCloseBtn').addEventListener('click', function() {
  drawerOpen = false;
  document.getElementById('satDrawer').classList.remove('open');
});

document.getElementById('tleRefreshBtn').addEventListener('click', async function() {
  var btn = document.getElementById('tleRefreshBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  try {
    await fetchFreshTLEs();
    updateTleFooter();
    btn.textContent = 'Refreshed';
    setTimeout(function() { btn.textContent = 'Refresh'; btn.disabled = false; }, 1500);
  } catch(e) {
    btn.textContent = 'Failed';
    setTimeout(function() { btn.textContent = 'Refresh'; btn.disabled = false; }, 1500);
  }
});

function showError(msg) {
  var toast = document.getElementById('errorToast');
  document.getElementById('errorMessage').textContent = msg;
  toast.classList.add('active');
  setTimeout(function() { toast.classList.remove('active'); }, 5000);
}

// 初期TLE取得(非同期)
loadTLEs(false).catch(function(err) {
  console.error('TLE load failed:', err);
  loadFallbackTLEs();
});

</script>
